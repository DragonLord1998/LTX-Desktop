name: Build & Push RunPod Docker Image

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "runpod/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.web.ts"
      - "index.html"
      - ".github/workflows/docker-runpod.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/ltx-desktop:latest
            ghcr.io/${{ steps.owner.outputs.name }}/ltx-desktop:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
